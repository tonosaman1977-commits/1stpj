<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>多言語研究説明エンジン</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .result-text { white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <div class="container py-4" style="max-width: 800px;">
    <h1 class="h3 mb-2 text-center">多言語研究説明エンジン</h1>
    <p class="text-center text-muted mb-4" style="font-size: 0.9rem;">
      研究概要を入力すると、<strong>やさしい日本語・英語・留学生向け説明</strong>を自動で生成します。<br>
      中国語・韓国語など追加言語はチェックボックスで選べます。
    </p>

    <!-- 入力フォーム -->
    <div class="card mb-4">
      <div class="card-body">
        <label for="researchText" class="form-label fw-semibold">研究概要を入力してください</label>
        <textarea id="researchText" class="form-control" rows="6"
          placeholder="研究の目的・方法・結果などを入力してください（20〜20,000文字）"
          maxlength="20000"></textarea>
        <div class="d-flex justify-content-between mt-1">
          <small class="text-danger" id="textError"></small>
          <small class="text-muted"><span id="charCount">0</span> / 20,000文字</small>
        </div>

        <div class="mt-3">
          <p class="fw-semibold mb-2">追加言語（任意）</p>
          <div class="d-flex flex-wrap gap-3">
            <div class="form-check">
              <input class="form-check-input lang-check" type="checkbox" value="chinese" id="lang_chinese">
              <label class="form-check-label" for="lang_chinese">中国語（簡体字）</label>
            </div>
            <div class="form-check">
              <input class="form-check-input lang-check" type="checkbox" value="korean" id="lang_korean">
              <label class="form-check-label" for="lang_korean">韓国語</label>
            </div>
            <div class="form-check">
              <input class="form-check-input lang-check" type="checkbox" value="vietnamese" id="lang_vietnamese">
              <label class="form-check-label" for="lang_vietnamese">ベトナム語</label>
            </div>
            <div class="form-check">
              <input class="form-check-input lang-check" type="checkbox" value="spanish" id="lang_spanish">
              <label class="form-check-label" for="lang_spanish">スペイン語</label>
            </div>
            <div class="form-check">
              <input class="form-check-input lang-check" type="checkbox" value="french" id="lang_french">
              <label class="form-check-label" for="lang_french">フランス語</label>
            </div>
          </div>
        </div>

        <button id="generateBtn" class="btn btn-primary mt-4 w-100">
          <span id="btnText">説明を生成する</span>
          <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status"></span>
        </button>
      </div>
    </div>

    <!-- エラー表示 -->
    <div id="errorSection" class="alert alert-danger d-none" role="alert">
      <p id="errorMsg" class="mb-2"></p>
      <button id="retryBtn" class="btn btn-outline-danger btn-sm">リトライ</button>
    </div>

    <!-- 固定セクション（3種） -->
    <div id="fixedResults" class="d-none">
      <div class="card mb-3">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span class="fw-semibold">やさしい日本語</span>
          <button class="btn btn-outline-secondary btn-sm" data-copy="result_easy_japanese">コピー</button>
        </div>
        <div class="card-body">
          <p id="result_easy_japanese" class="result-text mb-0"></p>
        </div>
      </div>

      <div class="card mb-3">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span class="fw-semibold">English Explanation</span>
          <button class="btn btn-outline-secondary btn-sm" data-copy="result_english">コピー</button>
        </div>
        <div class="card-body">
          <p id="result_english" class="result-text mb-0"></p>
        </div>
      </div>

      <div class="card mb-3">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span class="fw-semibold">留学生向け説明</span>
          <button class="btn btn-outline-secondary btn-sm" data-copy="result_for_international_students">コピー</button>
        </div>
        <div class="card-body">
          <p id="result_for_international_students" class="result-text mb-0"></p>
        </div>
      </div>
    </div>

    <!-- 追加言語セクション（動的生成） -->
    <div id="additionalResults"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    var LANG_LABELS = {
      chinese:    '中国語（簡体字）',
      korean:     '韓国語',
      vietnamese: 'ベトナム語',
      spanish:    'スペイン語',
      french:     'フランス語'
    };

    var textArea   = document.getElementById('researchText');
    var charCount  = document.getElementById('charCount');
    var textError  = document.getElementById('textError');
    var generateBtn = document.getElementById('generateBtn');
    var btnText    = document.getElementById('btnText');
    var btnSpinner = document.getElementById('btnSpinner');
    var errorSection = document.getElementById('errorSection');
    var errorMsg   = document.getElementById('errorMsg');
    var fixedResults = document.getElementById('fixedResults');

    textArea.addEventListener('input', function() {
      charCount.textContent = textArea.value.length;
      textError.textContent = '';
    });

    generateBtn.addEventListener('click', generate);
    document.getElementById('retryBtn').addEventListener('click', generate);

    document.addEventListener('click', function(e) {
      var btn = e.target.closest('[data-copy]');
      if (!btn) return;
      var text = document.getElementById(btn.getAttribute('data-copy')).textContent;
      navigator.clipboard.writeText(text).then(function() {
        var orig = btn.textContent;
        btn.textContent = 'コピー完了';
        btn.disabled = true;
        setTimeout(function() { btn.textContent = orig; btn.disabled = false; }, 1500);
      });
    });

    function generate() {
      var text = textArea.value.trim();
      if (text.length < 20) {
        textError.textContent = '20文字以上入力してください。';
        return;
      }
      if (text.length > 20000) {
        textError.textContent = '20,000文字以内にしてください。';
        return;
      }

      var selectedLanguages = Array.from(document.querySelectorAll('.lang-check:checked'))
        .map(function(cb) { return cb.value; });

      setLoading(true);
      errorSection.classList.add('d-none');
      fixedResults.classList.add('d-none');
      document.getElementById('additionalResults').innerHTML = '';

      google.script.run
        .withSuccessHandler(onSuccess)
        .withFailureHandler(onError)
        .generateExplanations(text, selectedLanguages);
    }

    function onSuccess(data) {
      setLoading(false);

      document.getElementById('result_easy_japanese').textContent = data.easy_japanese || '';
      document.getElementById('result_english').textContent = data.english || '';
      document.getElementById('result_for_international_students').textContent = data.for_international_students || '';
      fixedResults.classList.remove('d-none');

      var additionalResults = document.getElementById('additionalResults');
      ['chinese', 'korean', 'vietnamese', 'spanish', 'french'].forEach(function(lang) {
        if (!data[lang]) return;
        var card = document.createElement('div');
        card.className = 'card mb-3';
        var resultId = 'result_' + lang;
        card.innerHTML =
          '<div class="card-header d-flex justify-content-between align-items-center">' +
            '<span class="fw-semibold">' + LANG_LABELS[lang] + '</span>' +
            '<button class="btn btn-outline-secondary btn-sm" data-copy="' + resultId + '">コピー</button>' +
          '</div>' +
          '<div class="card-body">' +
            '<p id="' + resultId + '" class="result-text mb-0">' + escapeHtml(data[lang]) + '</p>' +
          '</div>';
        additionalResults.appendChild(card);
      });
    }

    function onError(error) {
      setLoading(false);
      errorMsg.textContent = error.message || String(error);
      errorSection.classList.remove('d-none');
    }

    function setLoading(loading) {
      generateBtn.disabled = loading;
      btnSpinner.classList.toggle('d-none', !loading);
      btnText.textContent = loading ? '生成中...' : '説明を生成する';
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
